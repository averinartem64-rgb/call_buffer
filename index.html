<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call-Буфер Оператора v2.0</title>
    <style>
        :root {
            --bg-color: #121214;
            --surface-color: #1a1a1e;
            --input-bg: #26262b;
            --text-color: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent-color: #10b981;
            --accent-hover: #059669;
            --border-color: #3f3f46;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ХЕДЕР И ЛЕНТА ЛИДОВ */
        header {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            height: 60px;
        }

        .logo {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--accent-color);
            white-space: nowrap;
        }

        .history-ribbon {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin: 0 20px;
            flex-grow: 1;
            padding-bottom: 5px;
        }

        .history-ribbon::-webkit-scrollbar { height: 4px; }
        .history-ribbon::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

        .lead-badge {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .lead-badge:hover { border-color: var(--accent-color); }
        .lead-badge.callback-badge { border-color: var(--warning-color); }

        .report-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        .report-btn:hover { background-color: #2563eb; }

        /* ОСНОВНОЙ КОНТЕНЕР */
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .form-container {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 600px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .form-container h2 {
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }
        .full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .form-control {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }
        .form-control:focus { border-color: var(--accent-color); }

        /* КНОПКИ ВЫБОРА (РАДИО) И ЧЕКБОКС */
        .radio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .region-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .radio-btn { display: none; }
        .radio-label {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }
        input[type="radio"]:checked + .radio-label {
            background-color: rgba(16, 185, 129, 0.15);
            border-color: var(--accent-color);
            color: var(--accent-color);
            font-weight: bold;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .checkbox-container:hover {
            border-color: var(--warning-color);
        }
        .checkbox-container input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--warning-color);
            cursor: pointer;
        }
        .checkbox-container span {
            font-size: 0.9rem;
            color: var(--text-color);
        }

        /* ДИНАМИЧЕСКИЕ БЛОКИ */
        .conditional-block {
            display: none;
            background-color: rgba(255,255,255,0.02);
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            margin-top: 5px;
        }

        .quick-tags {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .quick-tag-btn {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .quick-tag-btn:hover { border-color: var(--text-color); color: var(--text-color); }

        .submit-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            transition: background-color 0.2s;
        }
        .submit-btn:hover { background-color: var(--accent-hover); }

        /* ТАБЫ В МОДАЛКЕ */
        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .tab-btn {
            background-color: var(--input-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .tab-btn.active {
            background-color: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .tab-btn.active.tab-callback {
            background-color: rgba(245, 158, 11, 0.15);
            border-color: var(--warning-color);
            color: var(--warning-color);
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            width: 95%;
            max-width: 1000px;
            max-height: 85vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-modal { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .modal-body { padding: 15px 20px; overflow-y: auto; flex-grow: 1; }

        /* ТАБЛИЦА ОТЧЕТА */
        .report-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        .report-table th, .report-table td { padding: 10px; border-bottom: 1px solid var(--border-color); }
        .report-table th { color: var(--text-muted); font-weight: 600; }
        
        .copy-btn {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .copy-btn:hover { border-color: #3b82f6; color: #3b82f6; }
        
        .clear-btn {
            background-color: transparent;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .clear-btn:hover { background-color: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

    <header>
        <div class="logo">⚡ CALL-BUFFER v2.1</div>
        <div class="history-ribbon" id="historyRibbon"></div>
        <button class="report-btn" onclick="openModal()">📊 База данных</button>
    </header>

    <main>
        <div class="form-container">
            <h2>ДАННЫЕ ТЕКУЩЕГО ЗВОНКА</h2>
            <form id="leadForm" onsubmit="saveLead(event)">
                <div class="form-grid">
                    
                    <div class="form-group">
                        <label for="clientPhone">Номер *</label>
                        <input type="tel" id="clientPhone" class="form-control" placeholder="+7 (___) ___-__-__" required autocomplete="off" autofocus>
                    </div>

                    <div class="form-group">
                        <label for="clientName">Имя клиента *</label>
                        <input type="text" id="clientName" class="form-control" placeholder="Введите имя" required autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="clientTag">Тег *</label>
                        <input type="text" id="clientTag" class="form-control" placeholder="Уникальный тег" required autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="carModel">Марка/модель *</label>
                        <input type="text" id="carModel" class="form-control" placeholder="Chery Tiggo 4" required autocomplete="off">
                    </div>

                    <div class="form-group full-width">
                        <label for="criteria">Criteria / Условия покупки *</label>
                        <input type="text" id="criteria" class="form-control" placeholder="Цена от 1.5 млн, автомат, белый цвет" required autocomplete="off">
                    </div>

                    <div class="form-group full-width">
                        <label>Перевели на менеджера? *</label>
                        <div class="radio-grid">
                            <input type="radio" id="transferYes" name="transfer" value="Да" checked onclick="toggleTransferFields()" style="display:none;">
                            <label for="transferYes" class="radio-label">Да</label>

                            <input type="radio" id="transferNo" name="transfer" value="Нет" onclick="toggleTransferFields()" style="display:none;">
                            <label for="transferNo" class="radio-label">Нет</label>
                        </div>
                    </div>

                    <!-- НОВОЕ ПОЛЕ: ЧЕКБОКС ПЕРЕЗВОНА -->
                    <div class="form-group full-width">
                        <label class="checkbox-container" for="needCallback">
                            <input type="checkbox" id="needCallback">
                            <span>⏳ Нужен перезвон (клиент попросил набрать позже)</span>
                        </label>
                    </div>
                </div>

                <div id="blockTransferYes" class="conditional-block" style="display: block;">
                    <div class="form-group style-none">
                        <label>Куда перевели? *</label>
                        <div class="region-grid">
                            <input type="radio" id="regMSK" name="region" value="МСК" checked style="display:none;">
                            <label for="regMSK" class="radio-label" title="МСК">МСК</label>

                            <input type="radio" id="regSPB" name="region" value="СПБ" style="display:none;">
                            <label for="regSPB" class="radio-label" title="СПБ">СПБ</label>

                            <input type="radio" id="regNearMSK" name="region" value="Ближайшие города МСК" style="display:none;">
                            <label for="regNearMSK" class="radio-label" title="Ближайшие города МСК">Ближ. МСК</label>

                            <input type="radio" id="regNearSPB" name="region" value="Ближайшие города СПБ" style="display:none;">
                            <label for="regNearSPB" class="radio-label" title="Ближайшие города СПБ">Ближ. СПБ</label>

                            <input type="radio" id="regEKB" name="region" value="ЕКБ" style="display:none;">
                            <label for="regEKB" class="radio-label" title="ЕКБ">ЕКБ</label>

                            <input type="radio" id="regChery" name="region" value="Черри/Тенет СПБ Шувалово" style="display:none;">
                            <label for="regChery" class="radio-label" title="Черри/Тенет СПБ Шувалово">Шувалово</label>
                        </div>
                    </div>
                </div>

                <div id="blockTransferNo" class="conditional-block">
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="failReason">Почему не перевели на менеджера?</label>
                        <input type="text" id="failReason" class="form-control" placeholder="Укажите причину" autocomplete="off">
                        <div class="quick-tags">
                            <button type="button" class="quick-tag-btn" onclick="setFailReason('Техпроблема')">🛠 Техпроблема</button>
                            <button type="button" class="quick-tag-btn" onclick="setFailReason('Линия была занята')">📞 Линия занята</button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">СОХРАНИТЬ ДАННЫЕ (Enter)</button>
            </form>
        </div>
    </main>

    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <!-- ВКЛАДКИ / ТАБЫ ДЛЯ ПЕРЕКЛЮЧЕНИЯ БАЗ -->
                <div class="modal-tabs">
                    <button id="tabLeadsBtn" class="tab-btn active" onclick="switchTab('leads')">📋 Отчет (Google Форма)</button>
                    <button id="tabCallbacksBtn" class="tab-btn tab-callback" onclick="switchTab('callbacks')">⏳ Список Перезвонов</button>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <button class="clear-btn" id="clearDataBtn" onclick="clearCurrentDatabase()">🗑 Очистить эту базу</button>
                    <button class="close-modal" onclick="closeModal()">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <table class="report-table">
                    <thead>
                        <tr>
                            <th>Номер</th>
                            <th>Имя</th>
                            <th>Тег</th>
                            <th>Перевод?</th>
                            <th>Куда</th>
                            <th>Марка</th>
                            <th>Критерии</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let leads = JSON.parse(localStorage.getItem('operator_leads_v2')) || [];
        let callbacks = JSON.parse(localStorage.getItem('operator_callbacks_v2')) || [];
        let currentTab = 'leads'; // Текущая открытая вкладка в модалке

        // Управление маской телефона
        document.getElementById('clientPhone').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
            e.target.value = !x[2] ? x[1] : '+7 (' + x[2] + (x[3] ? ') ' + x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
        });

        // Переключение видимости зависимых полей
        function toggleTransferFields() {
            const isYes = document.getElementById('transferYes').checked;
            document.getElementById('blockTransferYes').style.display = isYes ? 'block' : 'none';
            document.getElementById('blockTransferNo').style.display = isYes ? 'none' : 'block';
            
            if(isYes) {
                document.getElementById('failReason').value = '';
            }
        }

        // Кнопки автоподстановки причины
        function setFailReason(text) {
            document.getElementById('failReason').value = text;
        }

        // Переключение табов в модальном окне
        function switchTab(tabName) {
            currentTab = tabName;
            document.getElementById('tabLeadsBtn').classList.toggle('active', tabName === 'leads');
            document.getElementById('tabCallbacksBtn').classList.toggle('active', tabName === 'callbacks');
            updateUI();
        }

        // Сохранение лида или перезвона
        function saveLead(event) {
            event.preventDefault();

            const phone = document.getElementById('clientPhone').value.trim();
            const name = document.getElementById('clientName').value.trim();
            const tag = document.getElementById('clientTag').value.trim();
            const car = document.getElementById('carModel').value.trim();
            const criteria = document.getElementById('criteria').value.trim();
            const transfer = document.querySelector('input[name="transfer"]:checked').value;
            const needCallback = document.getElementById('needCallback').checked;
            
            let details = '';
            if (transfer === 'Да') {
                details = document.querySelector('input[name="region"]:checked').value;
            } else {
                details = document.getElementById('failReason').value.trim() || 'Не указано';
            }

            const newRecord = { id: Date.now(), phone, name, tag, transfer, details, car, criteria, isCallback: needCallback };
            
            if (needCallback) {
                // Если стоит галка, кидаем в массив перезвонов
                callbacks.unshift(newRecord);
                localStorage.setItem('operator_callbacks_v2', JSON.stringify(callbacks));
            } else {
                // Иначе — в обычные отчеты
                leads.unshift(newRecord);
                localStorage.setItem('operator_leads_v2', JSON.stringify(leads));
            }

            // Полный сброс формы
            document.getElementById('leadForm').reset();
            document.getElementById('transferYes').checked = true;
            document.getElementById('regMSK').checked = true;
            toggleTransferFields();
            document.getElementById('clientPhone').focus();

            updateUI();
        }

        // Обновление ленты и таблицы
        function updateUI() {
            const ribbon = document.getElementById('historyRibbon');
            ribbon.innerHTML = '';
            
            // В верхней ленте выводим последние 6 записей из ОБЕИХ баз для быстрого доступа к номерам
            const combinedRecent = [...leads, ...callbacks]
                .sort((a, b) => b.id - a.id)
                .slice(0, 6);

            combinedRecent.forEach(item => {
                const badge = document.createElement('div');
                badge.className = 'lead-badge' + (item.isCallback ? ' callback-badge' : '');
                
                let icon = item.transfer === 'Да' ? '✅' : '❌';
                if (item.isCallback) icon = '⏳';
                
                badge.innerText = `${item.name} (${icon})`;
                badge.title = `Клик, чтобы скопировать номер телефона клиента ${item.name}`;
                badge.onclick = () => {
                    navigator.clipboard.writeText(item.phone);
                };
                ribbon.appendChild(badge);
            });

            // Рендер таблицы в зависимости от активного таба
            const tableBody = document.getElementById('reportTableBody');
            tableBody.innerHTML = '';
            
            const activeData = currentTab === 'leads' ? leads : callbacks;

            if(activeData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--text-muted); padding:30px;">Тут пока пусто</td></tr>`;
                return;
            }

            activeData.forEach(item => {
                const row = document.createElement('tr');
                const rowText = `${item.phone}\t${item.name}\t${item.tag}\t${item.transfer}\t${item.details}\t${item.car}\t${item.criteria}`;

                row.innerHTML = `
                    <td>${item.phone}</td>
                    <td><b>${item.name}</b></td>
                    <td><span style="color:var(--text-muted)">${item.tag}</span></td>
                    <td>${item.transfer === 'Да' ? '🟢 Да' : '🔴 Нет'}</td>
                    <td><i>${item.details}</i></td>
                    <td>${item.car}</td>
                    <td>${item.criteria}</td>
                    <td>
                        <button class="copy-btn" onclick="copyToClipboard('${rowText}', this)">📋 Копировать</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = button.innerText;
                button.innerText = '✅ Готово';
                button.style.borderColor = 'var(--accent-color)';
                setTimeout(() => { button.innerText = orig; button.style.borderColor = 'var(--border-color)'; }, 1000);
            });
        }

        // Очистка базы в зависимости от выбранного таба
        function clearCurrentDatabase() {
            const dbName = currentTab === 'leads' ? 'отчетов для Google Формы' : 'перезвонов';
            if(confirm(`Ты уверен, что хочешь полностью очистить базу ${dbName}?`)) {
                if (currentTab === 'leads') {
                    leads = [];
                    localStorage.removeItem('operator_leads_v2');
                } else {
                    callbacks = [];
                    localStorage.removeItem('operator_callbacks_v2');
                }
                updateUI();
            }
        }

        function openModal() { document.getElementById('reportModal').style.display = 'flex'; updateUI(); }
        function closeModal() { document.getElementById('reportModal').style.display = 'none'; }
        window.onclick = function(e) { if (e.target == document.getElementById('reportModal')) closeModal(); }

        updateUI();
    </script>
</body>
</html>
