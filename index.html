<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call-Буфер</title>
    <style>
        :root {
            --bg-color: #0b0713; 
            --surface-color: #130e22; 
            --input-bg: #1c1531; 
            --text-color: #f1edfa;
            --text-muted: #9d8eb9;
            --accent-color: #8b5cf6; 
            --accent-hover: #a78bfa;
            --border-color: #2d224b;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            height: 60px;
        }

        .logo {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--accent-color);
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .history-ribbon {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin: 0 20px;
            flex-grow: 1;
            padding-bottom: 5px;
        }

        .history-ribbon::-webkit-scrollbar { height: 4px; }
        .history-ribbon::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

        .lead-badge {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lead-badge:hover { border-color: var(--accent-color); color: var(--accent-hover); }
        .lead-badge.callback-badge { border-color: var(--warning-color); color: var(--warning-color); }

        .report-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: background-color 0.2s;
        }
        .report-btn:hover { background-color: var(--accent-hover); }

        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .form-container {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 600px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-container h2 {
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
            color: var(--accent-hover);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group { margin-bottom: 15px; }
        .full-width { grid-column: span 2; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .form-control {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-control:focus { border-color: var(--accent-color); }

        .radio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .region-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Сделал сетку 2х3 для длинных названий */
            gap: 8px;
        }

        .radio-label {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }
        input[type="radio"]:checked + .radio-label {
            background-color: rgba(139, 92, 246, 0.2);
            border-color: var(--accent-color);
            color: var(--accent-hover);
            font-weight: bold;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .checkbox-container:hover { border-color: var(--warning-color); }
        .checkbox-container input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--warning-color);
            cursor: pointer;
        }
        .checkbox-container span { font-size: 0.9rem; color: var(--text-color); }

        .conditional-block {
            display: none;
            background-color: rgba(255,255,255,0.01);
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            margin-top: 5px;
        }

        .quick-tags {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .quick-tag-btn {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-tag-btn:hover { border-color: var(--text-color); color: var(--text-color); }

        .submit-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            transition: background-color 0.2s;
        }
        .submit-btn:hover { background-color: #7c3aed; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            width: 95%;
            max-width: 1000px;
            max-height: 85vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-tabs { display: flex; gap: 10px; }
        .tab-btn {
            background-color: var(--input-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: rgba(139, 92, 246, 0.2);
            border-color: var(--accent-color);
            color: var(--accent-hover);
        }
        .tab-btn.active.tab-callback {
            background-color: rgba(245, 158, 11, 0.15);
            border-color: var(--warning-color);
            color: var(--warning-color);
        }

        .close-modal { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .modal-body { padding: 15px 20px; overflow-y: auto; flex-grow: 1; }

        .report-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        .report-table th, .report-table td { padding: 10px; border-bottom: 1px solid var(--border-color); }
        .report-table th { color: var(--text-muted); font-weight: 600; }
        
        .copy-btn {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .copy-btn:hover { border-color: var(--accent-color); color: var(--accent-hover); }
        
        .clear-btn {
            background-color: transparent;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background-color 0.2s;
        }
        .clear-btn:hover { background-color: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

    <header>
        <div class="logo">🔮 CALL-BUFFER</div>
        <div class="history-ribbon" id="historyRibbon"></div>
        <button class="report-btn" onclick="openModal()">📊 База данных</button>
    </header>

    <main>
        <div class="form-container">
            <h2>ДАННЫЕ ТЕКУЩЕГО ЗВОНКА</h2>
            <form id="leadForm" onsubmit="saveLead(event)">
                <div class="form-grid">
                    
                    <div class="form-group">
                        <label for="clientPhone">Номер телефона</label>
                        <input type="text" id="clientPhone" class="form-control" placeholder="+7 (___) ___-__-__" autocomplete="off" autofocus>
                    </div>

                    <div class="form-group">
                        <label for="clientName">Имя клиента</label>
                        <input type="text" id="clientName" class="form-control" placeholder="Имя или 'Клиент'" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="clientTag">Тег</label>
                        <input type="text" id="clientTag" class="form-control" placeholder="Уникальный тег" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="carModel">Какое авто ищет?</label>
                        <input type="text" id="carModel" class="form-control" placeholder="Марка / Модель" autocomplete="off">
                    </div>

                    <div class="form-group full-width">
                        <label for="criteria">Критерии (Бюджет, требования, цвет, коробка)</label>
                        <input type="text" id="criteria" class="form-control" placeholder="От 1.5 млн, автомат, только белый" autocomplete="off">
                    </div>

                    <div class="form-group full-width">
                        <label>Перевели на менеджера?</label>
                        <div class="radio-grid">
                            <input type="radio" id="transferYes" name="transfer" value="Да" checked onclick="toggleTransferFields()" style="display:none;">
                            <label for="transferYes" class="radio-label">Да</label>

                            <input type="radio" id="transferNo" name="transfer" value="Нет" onclick="toggleTransferFields()" style="display:none;">
                            <label for="transferNo" class="radio-label">Нет</label>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label class="checkbox-container" for="needCallback">
                            <input type="checkbox" id="needCallback">
                            <span>⏳ Нужен перезвон (клиент попросил набрать позже)</span>
                        </label>
                    </div>
                </div>

                <div id="blockTransferYes" class="conditional-block" style="display: block;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Куда перевели?</label>
                        <div class="region-grid">
                            <input type="radio" id="regMsk" name="region" value="МСК" checked style="display:none;">
                            <label for="regMsk" class="radio-label">МСК</label>

                            <input type="radio" id="regSpb" name="region" value="СПБ" style="display:none;">
                            <label for="regSpb" class="radio-label">СПБ</label>

                            <input type="radio" id="regNearMsk" name="region" value="Ближайшие города МСК" style="display:none;">
                            <label for="regNearMsk" class="radio-label">Ближайшие города МСК</label>

                            <input type="radio" id="regNearSpb" name="region" value="Ближайшие города СПБ" style="display:none;">
                            <label for="regNearSpb" class="radio-label">Ближайшие города СПБ</label>

                            <input type="radio" id="regEkb" name="region" value="ЕКБ" style="display:none;">
                            <label for="regEkb" class="radio-label">ЕКБ</label>

                            <input type="radio" id="regCherry" name="region" value="Черри/Тенет СПБ Шувалово" style="display:none;">
                            <label for="regCherry" class="radio-label">Черри/Тенет СПБ Шувалово</label>
                        </div>
                    </div>
                </div>

                <div id="blockTransferNo" class="conditional-block" style="display: none;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="failReason">Почему не перевели?</label>
                        <input type="text" id="failReason" class="form-control" placeholder="Укажите причину отмены" autocomplete="off">
                        <div class="quick-tags">
                            <button type="button" class="quick-tag-btn" onclick="setFailReason('Техпроблема')">⚙️ Техпроблема</button>
                            <button type="button" class="quick-tag-btn" onclick="setFailReason('Линия занята')">⏳ Линия занята</button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">СОХРАНИТЬ (Очистить)</button>
            </form>
        </div>
    </main>

    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-tabs">
                    <button id="tabLeadsBtn" class="tab-btn active" onclick="switchTab('leads')">📋 Основной отчет</button>
                    <button id="tabCallbacksBtn" class="tab-btn tab-callback" onclick="switchTab('callbacks')">⏳ Перезвоны</button>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <button class="clear-btn" onclick="clearCurrentDatabase()">🗑 Очистить вкладку</button>
                    <button class="close-modal" onclick="closeModal()">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <table class="report-table">
                    <thead>
                        <tr>
                            <th>Номер</th>
                            <th>Имя</th>
                            <th>Тег</th>
                            <th>Перевод</th>
                            <th>Инфо / Причина</th>
                            <th>Марка/Модель</th>
                            <th>Критерии</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let leads = JSON.parse(localStorage.getItem('operator_leads_v2')) || [];
        let callbacks = JSON.parse(localStorage.getItem('operator_callbacks_v2')) || [];
        let currentTab = 'leads';

        const phoneInput = document.getElementById('clientPhone');
        
        phoneInput.addEventListener('input', function (e) {
            let input = e.target.value.replace(/\D/g, ''); 
            
            if (input.startsWith('7')) {
                input = input.substring(1);
            } else if (input.startsWith('8')) {
                input = input.substring(1);
            }

            input = input.substring(0, 10);

            let formatted = '+7 (';
            if (input.length > 0) formatted += input.substring(0, 3);
            if (input.length >= 4) formatted += ') ' + input.substring(3, 6);
            if (input.length >= 7) formatted += '-' + input.substring(6, 8);
            if (input.length >= 9) formatted += '-' + input.substring(8, 10);

            e.target.value = input.length === 0 ? '' : formatted;
        });

        function toggleTransferFields() {
            const isYes = document.getElementById('transferYes').checked;
            document.getElementById('blockTransferYes').style.display = isYes ? 'block' : 'none';
            document.getElementById('blockTransferNo').style.display = isYes ? 'none' : 'block';
        }

        function setFailReason(text) { 
            document.getElementById('failReason').value = text; 
        }

        function switchTab(tabName) {
            currentTab = tabName;
            document.getElementById('tabLeadsBtn').classList.toggle('active', tabName === 'leads');
            document.getElementById('tabCallbacksBtn').classList.toggle('active', tabName === 'callbacks');
            updateUI();
        }

        function saveLead(event) {
            event.preventDefault(); 

            const phone = document.getElementById('clientPhone').value.trim() || 'Нет номера';
            const name = document.getElementById('clientName').value.trim() || 'Клиент';
            const tag = document.getElementById('clientTag').value.trim() || '—';
            const car = document.getElementById('carModel').value.trim() || '—';
            const criteria = document.getElementById('criteria').value.trim() || '—';
            
            const transfer = document.querySelector('input[name="transfer"]:checked').value;
            const needCallback = document.getElementById('needCallback').checked;
            
            let details = '—';
            if (transfer === 'Да') {
                const checkedRegion = document.querySelector('input[name="region"]:checked');
                details = checkedRegion ? checkedRegion.value : 'МСК';
            } else {
                details = document.getElementById('failReason').value.trim() || 'Не указано';
            }

            const newRecord = { 
                id: Date.now(), 
                phone, 
                name, 
                tag, 
                transfer, 
                details, 
                car, 
                criteria, 
                isCallback: needCallback 
            };
            
            if (needCallback) {
                callbacks.unshift(newRecord);
                localStorage.setItem('operator_callbacks_v2', JSON.stringify(callbacks));
            } else {
                leads.unshift(newRecord);
                localStorage.setItem('operator_leads_v2', JSON.stringify(leads));
            }

            document.getElementById('leadForm').reset();
            document.getElementById('transferYes').checked = true;
            document.getElementById('regMsk').checked = true;
            toggleTransferFields();
            
            updateUI();
            document.getElementById('clientPhone').focus();
        }

        function updateUI() {
            const ribbon = document.getElementById('historyRibbon');
            ribbon.innerHTML = '';
            
            const combinedRecent = [...leads, ...callbacks].sort((a, b) => b.id - a.id).slice(0, 6);

            combinedRecent.forEach(item => {
                const badge = document.createElement('div');
                badge.className = 'lead-badge' + (item.isCallback ? ' callback-badge' : '');
                let icon = item.transfer === 'Да' ? '✅' : '❌';
                if (item.isCallback) icon = '⏳';
                
                badge.innerText = `${item.name} (${icon})`;
                badge.onclick = () => { 
                    if(item.phone !== 'Нет номера') {
                        navigator.clipboard.writeText(item.phone);
                    }
                };
                ribbon.appendChild(badge);
            });

            const tableBody = document.getElementById('reportTableBody');
            tableBody.innerHTML = '';
            const activeData = currentTab === 'leads' ? leads : callbacks;

            if(activeData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--text-muted); padding:30px;">Записей пока нет</td></tr>`;
                return;
            }

            activeData.forEach(item => {
                const row = document.createElement('tr');
                const rowText = `${item.phone}\t${item.name}\t${item.tag}\t${item.transfer}\t${item.details}\t${item.car}\t${item.criteria}`;

                row.innerHTML = `
                    <td><b>${item.phone}</b></td>
                    <td>${item.name}</td>
                    <td><span style="color:var(--text-muted)">${item.tag}</span></td>
                    <td>${item.transfer === 'Да' ? '🟣 Да' : '⚪ Нет'}</td>
                    <td><i>${item.details}</i></td>
                    <td>${item.car}</td>
                    <td>${item.criteria}</td>
                    <td><button class="copy-btn" onclick="copyToClipboard('${rowText}', this)">📋 Копировать</button></td>
                `;
                tableBody.appendChild(row);
            });
        }

        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = button.innerText;
                button.innerText = '🔮 Скопировано';
                setTimeout(() => { button.innerText = orig; }, 1000);
            });
        }

        function clearCurrentDatabase() {
            const dbName = currentTab === 'leads' ? 'основных отчетов' : 'перезвонов';
            if(confirm(`Удалить все данные из вкладки ${dbName}?`)) {
                if (currentTab === 'leads') {
                    leads = [];
                    localStorage.removeItem('operator_leads_v2');
                } else {
                    callbacks = [];
                    localStorage.removeItem('operator_callbacks_v2');
                }
                updateUI();
            }
        }

        function openModal() { document.getElementById('reportModal').style.display = 'flex'; updateUI(); }
        function closeModal() { document.getElementById('reportModal').style.display = 'none'; }
        window.onclick = function(e) { if (e.target == document.getElementById('reportModal')) closeModal(); }

        updateUI();
    </script>
</body>
</html>
